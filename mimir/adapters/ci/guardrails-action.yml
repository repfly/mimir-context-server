name: Mimir Architecture Guardrails
on: [pull_request]

jobs:
  guardrail-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mimir
        run: pip install mimir-context-server

      - name: Build index (incremental)
        run: mimir index

      - name: Run guardrails
        run: |
          EXIT_CODE=0
          git diff origin/${{ github.base_ref }}...HEAD | \
            mimir guardrail check --diff - --rules mimir-rules.yaml \
              --output github-pr-comment \
              --report-file guardrail-report.md \
            || EXIT_CODE=$?
          cat guardrail-report.md >> $GITHUB_STEP_SUMMARY
          if [ "$EXIT_CODE" = "1" ]; then
            echo "::error::Guardrail errors found"
            exit 1
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "::warning::Guardrail BLOCK violations pending approval"
            exit 1
          fi
