name: Release & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build server package
        run: python -m build --outdir dist/

      - name: Build client package
        run: python -m build --outdir dist/
        working-directory: client

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            client/dist/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts

      - name: Collect all dist files
        run: |
          mkdir -p release-assets
          find artifacts -name '*.whl' -o -name '*.tar.gz' | xargs -I{} cp {} release-assets/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mimir ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*

  publish-server:
    name: Publish mimir-context-server to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts

      - name: Collect server dist
        run: |
          mkdir -p dist
          cp artifacts/dist/mimir_context_server* dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-client:
    name: Publish mimir-server-client to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts

      - name: Collect client dist
        run: |
          mkdir -p dist
          cp artifacts/client/dist/mimir_server_client* dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
