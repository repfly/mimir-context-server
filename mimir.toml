# Mimir — self-index configuration
# Indexes the Mimir source code itself for development and CI.

[[repos]]
name = "mimir"
path = "."
language_hint = "python"

[indexing]
summary_mode = "heuristic"
concurrency = 8
excluded_patterns = [
    "__pycache__", ".git", "*.pyc", ".venv", "venv",
    "dist", "build", "*.egg-info",
    "node_modules", "backstage-plugin",
]
max_file_size_kb = 500

[embeddings]
model = "all-mpnet-base-v2"
batch_size = 64

[vector_db]
backend = "numpy"

[retrieval]
default_beam_width = 3
default_token_budget = 8000
expansion_hops = 2
relevance_gate = 0.3

[temporal]
recency_lambda = 0.02
co_retrieval_enabled = true

[session]
context_decay_turns = 5
