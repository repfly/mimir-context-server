name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  guardrails:
    name: Architectural Guardrails
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Mimir
        run: pip install -e .

      - name: Build code graph
        run: mimir index

      - name: Validate rules syntax
        run: mimir guardrail test --rules mimir-rules.yaml

      - name: Run guardrail check
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | \
            mimir guardrail check --diff - --rules mimir-rules.yaml --output github-pr-comment \
            >> $GITHUB_STEP_SUMMARY
